name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.0.5)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  version-bump:
    name: Version Bump
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.create-tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install ALSA dev libraries
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Update version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          echo "Updating version to $VERSION..."
          sed -i "0,/^version = \".*\"/s//version = \"$VERSION\"/" Cargo.toml

      - name: Verify build
        run: cargo check

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "${{ github.event.inputs.version }}"
          git push

      - name: Create and push tag
        id: create-tag
        run: |
          TAG="v${{ github.event.inputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [version-bump]
    if: always() && (needs.version-bump.result == 'success' || (needs.version-bump.result == 'skipped' && startsWith(github.ref, 'refs/tags/')))

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.version-bump.outputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install ALSA dev libraries
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Verify build
        run: cargo check

      - name: Run tests
        run: cargo test

      - name: Publish beepboopd
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: Create GitHub Release
    needs: [version-bump, publish-crate]
    runs-on: ubuntu-latest
    if: always() && needs.publish-crate.result == 'success'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version-bump.outputs.tag || github.ref_name }}
          generate_release_notes: true
